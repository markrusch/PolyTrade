<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trader Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #161b22;
      padding: 12px 20px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    header h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .config-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #8b949e;
      flex: 1;
    }
    .config-info span { white-space: nowrap; }
    .config-info input { font-size: 12px; }
    .config-info button { font-size: 12px; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 2fr 2fr 1.5fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #58a6ff;
    }
    .panel-content {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    #spot-panel { grid-column: 1 / 2; grid-row: 1 / 2; }
    #yes-panel { grid-column: 2 / 3; grid-row: 1 / 2; }
    #no-panel { grid-column: 2 / 3; grid-row: 2 / 3; }
    #books-panel { grid-column: 3 / 4; grid-row: 1 / 3; }
    #trades-panel { grid-column: 1 / 2; grid-row: 2 / 3; }

    .books-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
    }
    .book-section {
      flex: 1;
      overflow: auto;
    }
    .book-section h3 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #8b949e;
    }

    canvas {
      max-width: 100%;
      max-height: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    th, td {
      padding: 4px 6px;
      text-align: right;
      border-bottom: 1px solid #21262d;
    }
    th {
      background: #0d1117;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
      font-size: 10px;
    }
    .bid { color: #3fb950; }
    .ask { color: #f85149; }
    .yes-market { color: #58a6ff; }
    .no-market { color: #f85149; }

    #status {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: #238636;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    #status.disconnected { background: #da3633; }
  </style>
</head>
<body>
  <header>
    <h1>Trader Dashboard</h1>
    <div class="config-info">
      <input type="text" id="slugInput" placeholder="Market slug" value="ethereum-above-3000-on-december-31" style="padding:6px 10px;border-radius:4px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;width:300px;" />
      <input type="text" id="assetInput" placeholder="Asset" value="ETH" style="padding:6px 10px;border-radius:4px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;width:80px;" />
      <button id="startBtn" style="padding:6px 16px;border-radius:4px;border:none;background:#238636;color:#fff;font-weight:600;cursor:pointer;">Start</button>
      <button id="stopBtn" style="padding:6px 16px;border-radius:4px;border:none;background:#da3633;color:#fff;font-weight:600;cursor:pointer;">Stop</button>
      <span>Strike: <strong id="marketStrike">-</strong></span>
      <span>Market Expiry: <strong id="marketExpiry">-</strong></span>
      <span>Deribit Expiry: 
        <select id="expirySelect" style="font-weight:bold;padding:4px 8px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;border-radius:4px;cursor:pointer;font-size:12px;">
          <option value="">Loading...</option>
        </select>
      </span>
    </div>
  </header>

  <main>
    <div class="panel" id="spot-panel">
      <div class="panel-title">Spot vs Strike</div>
      <div class="panel-content">
        <canvas id="spotChart"></canvas>
      </div>
    </div>

    <div class="panel" id="yes-panel">
      <div class="panel-title">YES Market: Odds vs Implied Probability <span id="yesFairDist" style="font-size:11px;color:#8b949e;margin-left:10px;"></span></div>
      <div class="panel-content">
        <canvas id="yesOddsChart"></canvas>
      </div>
    </div>

    <div class="panel" id="no-panel">
      <div class="panel-title">NO Market: Odds vs Implied Probability <span id="noFairDist" style="font-size:11px;color:#8b949e;margin-left:10px;"></span></div>
      <div class="panel-content">
        <canvas id="noOddsChart"></canvas>
      </div>
    </div>

    <div class="panel" id="books-panel">
      <div class="panel-title">Order Books</div>
      <div class="panel-content">
        <div class="books-container">
          <div class="book-section">
            <h3>YES Market</h3>
            <table>
              <thead>
                <tr>
                  <th>Bid Size</th>
                  <th>Bid</th>
                  <th>Ask</th>
                  <th>Ask Size</th>
                </tr>
              </thead>
              <tbody id="yesBookBody"></tbody>
            </table>
          </div>
          <div class="book-section">
            <h3>NO Market</h3>
            <table>
              <thead>
                <tr>
                  <th>Bid Size</th>
                  <th>Bid</th>
                  <th>Ask</th>
                  <th>Ask Size</th>
                </tr>
              </thead>
              <tbody id="noBookBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="trades-panel">
      <div class="panel-title">Recent Trades</div>
      <div class="panel-content">
        <table id="tradesTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Market</th>
              <th>Side</th>
              <th>Price</th>
              <th>Size</th>
            </tr>
          </thead>
          <tbody id="tradesBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="status">Connecting...</div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="/app.js" type="module"></script>
</body>
</html>
